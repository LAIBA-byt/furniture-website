<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background-color: #ffffff;
}

/* Card */
.login-card {
  max-width: 400px;
  margin: auto;
  margin-top: 80px;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* Heading */
.login-title {
  color: #93C572;
  font-weight: bold;
}

/* Input focus */
.form-control:focus {
  border-color: #93C572;
  box-shadow: 0 0 0 0.2rem rgba(147, 197, 114, 0.25);
}

/* Button */
.btn-pistachio {
  background-color: #93C572;
  color: white;
  border: none;
}

.btn-pistachio:hover {
  background-color: #7fb35f;
  color: white;
}
</style>

</head>

<body>

<div class="login-card">

  <h3 class="text-center login-title mb-4">Login</h3>

  <form>

    <div class="mb-3">
      <label>Email</label>
      <input type="email" class="form-control" placeholder="Enter your email">
    </div>

    <div class="mb-3">
      <label>Password</label>
      <input type="password" class="form-control" placeholder="Enter password">
    </div>

    <button type="submit" class="btn btn-pistachio w-100 rounded-0">
      Login
    </button>

    <p class="text-center mt-3">
      Don’t have an account? <a href="#" style="color:#93C572;">Sign up</a>
    </p>

  </form>

</div>

</body>
</html>
