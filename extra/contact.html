<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background-color: #ffffff;
}

/* Heading */
.contact-title {
  color: #93C572;
  font-weight: bold;
}

/* Card */
.contact-card {
  border: none;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

/* Inputs */
.form-control:focus {
  border-color: #93C572;
  box-shadow: 0 0 0 0.2rem rgba(147, 197, 114, 0.25);
}

/* Pistachio Button */
.btn-pistachio {
  background-color: #93C572;
  color: white;
  border: none;
  transition: 0.3s;
}

.btn-pistachio:hover {
  background-color: #7fb35f;
  color: white;
}

/* Map */
.map-box {
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<div class="container my-5">

  <!-- Title -->
  <h2 class="text-center contact-title mb-4">Get In Touch</h2>
  <p class="text-center text-muted mb-5">
    We’d love to hear from you. Contact us for any query or support.
  </p>

  <div class="row g-4">

    <!-- Contact Form -->
    <div class="col-md-6">
      <div class="card contact-card p-4">

        <h5 class="mb-3">Send Message</h5>

        <form>
          <div class="mb-3">
            <input type="text" class="form-control" placeholder="Your Name">
          </div>

          <div class="mb-3">
            <input type="email" class="form-control" placeholder="Your Email">
          </div>

          <div class="mb-3">
            <input type="text" class="form-control" placeholder="Subject">
          </div>

          <div class="mb-3">
            <textarea class="form-control" rows="5" placeholder="Your Message"></textarea>
          </div>

          <button class="btn btn-pistachio rounded-0 w-100">
            Send Message
          </button>
        </form>

      </div>
    </div>

    <!-- Contact Info + Map -->
    <div class="col-md-6">

      <!-- Info -->
      <div class="card contact-card p-4 mb-3">

        <h5>Contact Info</h5>
        <p class="mb-1">📍 Pattoki, Pakistan</p>
        <p class="mb-1">📞 +92 3177520498</p>
        <p class="mb-1">📧 info@furniturelaiba.com</p>

      </div>

      <!-- Map -->
      <div class="map-box">

        <iframe 
          src="https://www.google.com/maps?q=Pakistan&output=embed"
          width="100%" 
          height="250" 
          style="border:0;" 
          loading="lazy">
        </iframe>

      </div>

    </div>

  </div>
</div>

</body>
</html>
